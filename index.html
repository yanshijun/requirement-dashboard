<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>йңҖжұӮжұ  В· йЎ№зӣ®з®ЎзҗҶзңӢжқҝ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; }
.header { background: #fff; border-bottom: 1px solid #e8ecf0; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.header-left h1 { font-size: 16px; font-weight: 700; color: #1a1a2e; }
.header-left p { font-size: 11px; color: #9ca3af; margin-top: 1px; }
.header-right { display: flex; gap: 8px; align-items: center; }
.btn-refresh { background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: #374151; cursor: pointer; }
.btn-refresh:hover { background: #e5e7eb; }
.tab-btn { padding: 7px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
.tab-btn.active { background: #4f46e5; color: #fff; }
.tab-btn:not(.active) { background: #f3f4f6; color: #6b7280; }
.tab-btn:not(.active):hover { background: #e5e7eb; }
.stats-bar { background: #fff; border-bottom: 1px solid #e8ecf0; padding: 12px 24px; display: flex; gap: 10px; flex-wrap: wrap; }
.stat-card { border-radius: 8px; padding: 7px 16px; text-align: center; border: 1px solid; }
.stat-card .num { font-size: 20px; font-weight: 700; line-height: 1; }
.stat-card .lbl { font-size: 11px; margin-top: 2px; opacity: .75; }
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 300px; gap: 14px; color: #9ca3af; }
.spinner { width: 36px; height: 36px; border: 3px solid #e5e7eb; border-top-color: #4f46e5; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { margin: 24px; background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px; padding: 20px 24px; }
.error-box h3 { color: #dc2626; font-size: 14px; margin-bottom: 8px; }
.error-box p { color: #6b7280; font-size: 13px; line-height: 1.6; }
.error-box code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
.main { padding: 16px 24px; }
.filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.filters input { border: 1px solid #d1d5db; border-radius: 6px; padding: 6px 12px; font-size: 12px; width: 170px; outline: none; }
.filters input:focus { border-color: #4f46e5; }
.filters select { border: 1px solid #d1d5db; border-radius: 6px; padding: 6px 10px; font-size: 12px; color: #374151; background: #fff; cursor: pointer; outline: none; }
.filter-count { font-size: 12px; color: #9ca3af; margin-left: 4px; }
.table-wrap { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: #f9fafb; border-bottom: 2px solid #e5e7eb; }
thead th { padding: 10px 12px; text-align: left; font-weight: 600; color: #6b7280; font-size: 11px; white-space: nowrap; text-transform: uppercase; }
tbody tr { border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: background .1s; }
tbody tr:hover { background: #f5f3ff; }
tbody tr.expanded { background: #f5f3ff; }
tbody td { padding: 9px 12px; vertical-align: middle; }
.desc-row td { background: #fafafa; padding: 10px 24px 14px; }
.desc-content { font-size: 12px; color: #4b5563; line-height: 1.7; border-left: 3px solid #4f46e5; padding-left: 12px; }
.tag { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; white-space: nowrap; border: 1px solid; }
.prog-wrap { display: flex; align-items: center; gap: 6px; min-width: 110px; }
.prog-bar { flex: 1; height: 6px; background: #f3f4f6; border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; }
.prog-txt { font-size: 11px; color: #9ca3af; min-width: 28px; }
.kanban { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
.kb-col { min-width: 210px; flex: 0 0 210px; background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; overflow: hidden; }
.kb-head { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid; }
.kb-head-title { font-weight: 700; font-size: 13px; }
.kb-count { color: #fff; border-radius: 10px; padding: 1px 8px; font-size: 11px; font-weight: 700; }
.kb-body { padding: 8px; display: flex; flex-direction: column; gap: 7px; max-height: 560px; overflow-y: auto; }
.kb-card { background: #f9fafb; border-radius: 7px; padding: 10px 11px; border: 1px solid #e5e7eb; }
.kb-card-id { font-size: 10px; color: #d1d5db; font-family: monospace; margin-bottom: 3px; }
.kb-card-name { font-size: 12px; font-weight: 600; color: #1f2937; line-height: 1.4; margin-bottom: 7px; }
.kb-card-foot { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
.kb-empty { color: #d1d5db; font-size: 12px; text-align: center; padding: 24px 0; }
.person-list { display: flex; flex-direction: column; gap: 14px; }
.person-card { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; overflow: hidden; }
.person-head { padding: 14px 20px; background: #f9fafb; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: #4f46e5; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
.person-info { flex: 1; }
.person-info h3 { font-size: 15px; font-weight: 700; }
.person-info p { font-size: 12px; color: #9ca3af; margin-top: 2px; }
.person-counts { display: flex; gap: 8px; }
.pcount { text-align: center; border-radius: 8px; padding: 5px 14px; border: 1px solid; }
.pcount .n { font-weight: 700; font-size: 16px; }
.pcount .l { font-size: 11px; opacity: .75; }
.person-prog { min-width: 140px; }
.person-prog .pl { font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
.person-table { font-size: 12px; width: 100%; border-collapse: collapse; }
.person-table th { padding: 7px 12px; background: #fdfdfd; border-bottom: 1px solid #f3f4f6; color: #9ca3af; font-weight: 600; font-size: 11px; text-align: left; white-space: nowrap; }
.person-table td { padding: 7px 12px; border-bottom: 1px solid #f9fafb; }
.name-cell { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
.atag { border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 500; }
.unassigned { background: #fef9c3; color: #854d0e; }
.assigned { background: #eff6ff; color: #1d4ed8; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <h1>рҹ“Ұ е®ўжңҚGPT SAEзүҲ В· йңҖжұӮжұ зңӢжқҝ</h1>
    <p id="update-time">ж•°жҚ®еҠ иҪҪдёӯ...</p>
  </div>
  <div class="header-right">
    <button class="btn-refresh" onclick="loadData()">рҹ”„ еҲ·ж–°ж•°жҚ®</button>
    <button class="tab-btn active" onclick="switchTab('list',this)">рҹ“Ӣ йңҖжұӮеҲ—иЎЁ</button>
    <button class="tab-btn" onclick="switchTab('kanban',this)">рҹ—Ӯ ејҖеҸ‘зңӢжқҝ</button>
    <button class="tab-btn" onclick="switchTab('person',this)">рҹ‘Ө дәәе‘ҳд»»еҠЎ</button>
  </div>
</div>
<div class="stats-bar" id="stats-bar"><div style="color:#9ca3af;font-size:13px;align-self:center">еҠ иҪҪдёӯ...</div></div>
<div class="main" id="main-content"><div class="loading"><div class="spinner"></div><span>жӯЈеңЁд»ҺйЈһд№ҰиҺ·еҸ–ж•°жҚ®...</span></div></div>

<script>
var PC  = {зҙ§жҖҘ:["#ff4d4f","#fff1f0"],й«ҳ:["#fa8c16","#fff7e6"],дёӯ:["#faad14","#fffbe6"],дҪҺ:["#8c8c8c","#f5f5f5"]};
var SC  = {еҫ…ејҖе§Ӣ:["#8c8c8c","#f5f5f5"],ејҖеҸ‘дёӯ:["#1677ff","#e6f4ff"],иҒ”и°ғдёӯ:["#722ed1","#f9f0ff"],жөӢиҜ•дёӯ:["#fa8c16","#fff7e6"],е·ІдёҠзәҝ:["#52c41a","#f6ffed"],е·ІжҡӮзј“:["#ff4d4f","#fff1f0"]};
var TC  = {з”ЁжҲ·йңҖжұӮ:["#1677ff","#e6f4ff"],з ”еҸ‘йңҖжұӮ:["#fa8c16","#fff7e6"]};
var PLC = {"SAE2.3.3":["#722ed1","#f9f0ff"],"1688е•ҶиҙёзүҲ":["#13c2c2","#e6fffb"]};
var allRows=[],curTab="list",fSearch="",fPlan="е…ЁйғЁ",fType="е…ЁйғЁ",fPriority="е…ЁйғЁ",fStatus="е…ЁйғЁ",fAssignee="е…ЁйғЁ",expandedId=null;

async function loadData() {
  document.getElementById("main-content").innerHTML='<div class="loading"><div class="spinner"></div><span>жӯЈеңЁд»ҺйЈһд№ҰиҺ·еҸ–ж•°жҚ®...</span></div>';
  document.getElementById("update-time").textContent="ж•°жҚ®еҠ иҪҪдёӯ...";
  try {
    var res = await fetch("/.netlify/functions/feishu");
    var json = await res.json();
    if (!json.success) throw new Error(json.error);
    allRows = json.data;
    document.getElementById("update-time").textContent="жңҖеҗҺжӣҙж–°пјҡ"+new Date().toLocaleString("zh-CN")+" В· е…ұ"+allRows.length+"жқЎ";
    renderStats();
    renderTab();
  } catch(e) {
    document.getElementById("main-content").innerHTML='<div class="error-box"><h3>вҡ пёҸ ж•°жҚ®еҠ иҪҪеӨұиҙҘ</h3><p>й”ҷиҜҜпјҡ<code>'+e.message+'</code></p><p style="margin-top:8px">иҜ·жЈҖжҹҘйЈһд№Ұеә”з”Ёжқғйҷҗй…ҚзҪ®жҳҜеҗҰжӯЈзЎ®</p></div>';
    document.getElementById("update-time").textContent="еҠ иҪҪеӨұиҙҘ";
  }
}

function renderStats() {
  var r=allRows;
  var items=[["жҖ»йңҖжұӮ",r.length,"#4f46e5","#eef2ff","#c7d2fe"],["з”ЁжҲ·йңҖжұӮ",r.filter(function(x){return x.type==="з”ЁжҲ·йңҖжұӮ"}).length,"#1677ff","#e6f4ff","#bae0ff"],["з ”еҸ‘йңҖжұӮ",r.filter(function(x){return x.type==="з ”еҸ‘йңҖжұӮ"}).length,"#fa8c16","#fff7e6","#ffd591"],["рҹ”ҙ зҙ§жҖҘ",r.filter(function(x){return x.priority==="зҙ§жҖҘ"}).length,"#ff4d4f","#fff1f0","#ffccc7"],["иҝӣиЎҢдёӯ",r.filter(function(x){return["ејҖеҸ‘дёӯ","иҒ”и°ғдёӯ","жөӢиҜ•дёӯ"].includes(x.status)}).length,"#722ed1","#f9f0ff","#d3adf7"],["е·ІдёҠзәҝ",r.filter(function(x){return x.status==="е·ІдёҠзәҝ"}).length,"#52c41a","#f6ffed","#b7eb8f"],["еҫ…и®ӨйўҶ",r.filter(function(x){return x.assignee==="еҫ…и®ӨйўҶ"}).length,"#8c8c8c","#f5f5f5","#d9d9d9"]];
  document.getElementById("stats-bar").innerHTML=items.map(function(i){return'<div class="stat-card" style="background:'+i[3]+';border-color:'+i[4]+'"><div class="num" style="color:'+i[2]+'">'+i[1]+'</div><div class="lbl" style="color:'+i[2]+'">'+i[0]+'</div></div>'}).join("");
}

function tag(l,c){if(!l)return"";var col=c||["#8c8c8c","#f5f5f5"];return'<span class="tag" style="color:'+col[0]+';background:'+col[1]+';border-color:'+col[0]+'30">'+l+'</span>';}
function prog(v){var c=v===100?"#52c41a":v>=70?"#1677ff":v>=30?"#faad14":"#d9d9d9";return'<div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:'+v+'%;background:'+c+'"></div></div><span class="prog-txt">'+v+'%</span></div>';}
function atag(a){return'<span class="atag '+(a==="еҫ…и®ӨйўҶ"?"unassigned":"assigned")+'">'+a+'</span>';}
function switchTab(t,btn){curTab=t;document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.remove("active")});btn.classList.add("active");renderTab();}
function renderTab(){if(curTab==="list")renderList();else if(curTab==="kanban")renderKanban();else renderPerson();}
function selOpts(opts,val,fn){return'<select onchange="'+fn+'(this.value)">'+opts.map(function(o){return'<option'+(o===val?' selected':'')+'>'+o+'</option>'}).join("")+'</select>';}

function renderList(){
  var assignees=["е…ЁйғЁ"].concat(Array.from(new Set(allRows.map(function(r){return r.assignee}))));
  var filtered=allRows.filter(function(r){
    if(fPlan!=="е…ЁйғЁ"&&r.plan!==fPlan)return false;
    if(fType!=="е…ЁйғЁ"&&r.type!==fType)return false;
    if(fPriority!=="е…ЁйғЁ"&&r.priority!==fPriority)return false;
    if(fStatus!=="е…ЁйғЁ"&&r.status!==fStatus)return false;
    if(fAssignee!=="е…ЁйғЁ"&&r.assignee!==fAssignee)return false;
    if(fSearch&&!r.name.includes(fSearch)&&!r.id.includes(fSearch))return false;
    return true;
  });
  document.getElementById("main-content").innerHTML=
    '<div class="filters">'+
    '<input placeholder="рҹ”Қ жҗңзҙўзј–еҸ·/еҗҚз§°..." value="'+fSearch+'" oninput="fSearch=this.value;renderList()">'+
    selOpts(["е…ЁйғЁ","SAE2.3.3","1688е•ҶиҙёзүҲ"],fPlan,"setPlan")+
    selOpts(["е…ЁйғЁ","з”ЁжҲ·йңҖжұӮ","з ”еҸ‘йңҖжұӮ"],fType,"setType")+
    selOpts(["е…ЁйғЁ","зҙ§жҖҘ","й«ҳ","дёӯ","дҪҺ"],fPriority,"setPriority")+
    selOpts(["е…ЁйғЁ","еҫ…ејҖе§Ӣ","ејҖеҸ‘дёӯ","иҒ”и°ғдёӯ","жөӢиҜ•дёӯ","е·ІдёҠзәҝ","е·ІжҡӮзј“"],fStatus,"setStatus")+
    selOpts(assignees,fAssignee,"setAssignee")+
    '<span class="filter-count">е…ұ '+filtered.length+' жқЎ</span></div>'+
    '<div class="table-wrap"><table><thead><tr><th>йңҖжұӮзј–еҸ·</th><th>йңҖжұӮеҗҚз§°</th><th>жүҖеұһи®ЎеҲ’</th><th>дјҳе…Ҳзә§</th><th>йңҖжұӮзұ»еһӢ</th><th>жҸҗеҮәж—¶й—ҙ</th><th>йңҖжұӮи®ӨйўҶдәә</th><th>ејҖеҸ‘зҠ¶жҖҒ</th><th>ејҖеҸ‘иҝӣеәҰ</th></tr></thead><tbody>'+
    filtered.map(function(r){
      var exp=expandedId===r.id;
      return'<tr class="'+(exp?"expanded":"")+'" onclick="toggleRow(\''+r.id+'\')">'+
        '<td style="font-family:monospace;font-size:11px;color:#9ca3af">'+r.id+'</td>'+
        '<td style="font-weight:500;max-width:220px"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+r.name+'</div></td>'+
        '<td>'+tag(r.plan,PLC[r.plan])+'</td><td>'+tag(r.priority,PC[r.priority])+'</td><td>'+tag(r.type,TC[r.type])+'</td>'+
        '<td style="color:#9ca3af;font-size:12px;white-space:nowrap">'+r.date+'</td>'+
        '<td>'+atag(r.assignee)+'</td><td>'+tag(r.status,SC[r.status])+'</td><td>'+prog(r.progress)+'</td></tr>'+
        (exp?'<tr class="desc-row"><td colspan="9"><div class="desc-content"><strong style="color:#4f46e5">йңҖжұӮжҸҸиҝ°пјҡ</strong>'+r.desc+'</div></td></tr>':"");
    }).join("")+'</tbody></table></div>';
}
function toggleRow(id){expandedId=expandedId===id?null:id;renderList();}
function setPlan(v){fPlan=v;renderList();}
function setType(v){fType=v;renderList();}
function setPriority(v){fPriority=v;renderList();}
function setStatus(v){fStatus=v;renderList();}
function setAssignee(v){fAssignee=v;renderList();}

function renderKanban(){
  var cols=["еҫ…ејҖе§Ӣ","ејҖеҸ‘дёӯ","иҒ”и°ғдёӯ","жөӢиҜ•дёӯ","е·ІдёҠзәҝ"];
  var map={};cols.forEach(function(c){map[c]=[];});
  allRows.forEach(function(r){if(map[r.status])map[r.status].push(r);});
  document.getElementById("main-content").innerHTML='<div class="kanban">'+cols.map(function(col){
    var c=SC[col]||["#8c8c8c","#f5f5f5"];
    return'<div class="kb-col"><div class="kb-head" style="background:'+c[1]+';border-color:'+c[0]+'"><span class="kb-head-title" style="color:'+c[0]+'">'+col+'</span><span class="kb-count" style="background:'+c[0]+'">'+map[col].length+'</span></div><div class="kb-body">'+
    (map[col].length===0?'<div class="kb-empty">жҡӮж— йңҖжұӮ</div>':map[col].map(function(r){
      return'<div class="kb-card"><div class="kb-card-id">'+r.id+'</div><div class="kb-card-name">'+r.name+'</div><div class="kb-card-foot">'+tag(r.priority,PC[r.priority])+atag(r.assignee)+'</div>'+(r.progress>0?'<div style="margin-top:6px">'+prog(r.progress)+'</div>':'')+'</div>';
    }).join(""))+
    '</div></div>';
  }).join("")+'</div>';
}

function renderPerson(){
  var map={};
  allRows.forEach(function(r){
    if(r.assignee==="еҫ…и®ӨйўҶ")return;
    if(!map[r.assignee])map[r.assignee]={done:0,doing:0,pending:0,items:[]};
    if(r.status==="е·ІдёҠзәҝ")map[r.assignee].done++;
    else if(r.status==="еҫ…ејҖе§Ӣ")map[r.assignee].pending++;
    else map[r.assignee].doing++;
    map[r.assignee].items.push(r);
  });
  var persons=Object.entries(map).sort(function(a,b){return b[1].items.length-a[1].items.length});
  document.getElementById("main-content").innerHTML='<div class="person-list">'+persons.map(function(entry){
    var name=entry[0],d=entry[1],total=d.items.length;
    var avgP=total?Math.round(d.items.reduce(function(s,r){return s+r.progress},0)/total):0;
    var pc=avgP===100?"#52c41a":avgP>=60?"#1677ff":avgP>=30?"#faad14":"#d9d9d9";
    return'<div class="person-card"><div class="person-head">'+
      '<div class="avatar">'+name[0]+'</div>'+
      '<div class="person-info"><h3>'+name+'</h3><p>е…ұ '+total+' жқЎйңҖжұӮ В· ж•ҙдҪ“иҝӣеәҰ '+avgP+'%</p></div>'+
      '<div class="person-counts">'+
      [["е·ІдёҠзәҝ",d.done,"#52c41a","#f6ffed","#b7eb8f"],["иҝӣиЎҢдёӯ",d.doing,"#1677ff","#e6f4ff","#bae0ff"],["еҫ…ејҖе§Ӣ",d.pending,"#8c8c8c","#f5f5f5","#d9d9d9"]].map(function(x){
        return'<div class="pcount" style="background:'+x[3]+';border-color:'+x[4]+'"><div class="n" style="color:'+x[2]+'">'+x[1]+'</div><div class="l" style="color:'+x[2]+'">'+x[0]+'</div></div>';
      }).join("")+'</div>'+
      '<div class="person-prog"><div class="pl">ж•ҙдҪ“иҝӣеәҰ</div><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:'+avgP+'%;background:'+pc+'"></div></div><span class="prog-txt">'+avgP+'%</span></div></div>'+
      '</div>'+
      '<table class="person-table"><thead><tr><th>зј–еҸ·</th><th>йңҖжұӮеҗҚз§°</th><th>жүҖеұһи®ЎеҲ’</th><th>дјҳе…Ҳзә§</th><th>ејҖеҸ‘зҠ¶жҖҒ</th><th>ејҖеҸ‘иҝӣеәҰ</th></tr></thead><tbody>'+
      d.items.map(function(r){
        return'<tr><td style="font-family:monospace;font-size:11px;color:#d1d5db">'+r.id+'</td><td><div class="name-cell">'+r.name+'</div></td><td>'+tag(r.plan,PLC[r.plan])+'</td><td>'+tag(r.priority,PC[r.priority])+'</td><td>'+tag(r.status,SC[r.status])+'</td><td>'+prog(r.progress)+'</td></tr>';
      }).join("")+
      '</tbody></table></div>';
  }).join("")+'</div>';
}

loadData();
</script>
