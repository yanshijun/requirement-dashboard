[build]
  publish = "."

[dev]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/feishu"
  to = "/.netlify/functions/feishu"
  status = 200

[[redirects]]
  from = "/api/kb"
  to = "/.netlify/functions/kb"
  status = 200

[[redirects]]
  from = "/api/upload"
  to = "/.netlify/functions/upload"
  status = 200

[[redirects]]
  from = "/api/groups"
  to = "/.netlify/functions/groups"
  status = 200

[[redirects]]
  from = "/api/bugs"
  to = "/.netlify/functions/bugs"
  status = 200

[[redirects]]
  from = "/api/reqbugs"
  to = "/.netlify/functions/reqbugs"
  status = 200

[[redirects]]
  from = "/api/auth"
  to = "/.netlify/functions/auth"
  status = 200

[[redirects]]
  from = "/api/users"
  to = "/.netlify/functions/users"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"